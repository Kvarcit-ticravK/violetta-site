<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<rect width="64" height="64" rx="14" fill="#F8F3EA"/>
<g transform="translate(32 33)">
  <!-- два верхних лепестка — глубже тоном -->
  <ellipse cx="-9" cy="-10" rx="10" ry="12" transform="rotate(-28)" fill="#7B5EA7"/>
  <ellipse cx="9" cy="-10" rx="10" ry="12" transform="rotate(28)" fill="#7B5EA7"/>
  <!-- три нижних — светлее, сиреневые -->
  <ellipse cx="-13" cy="6" rx="9" ry="11" transform="rotate(-70 -13 6)" fill="#9B85C4"/>
  <ellipse cx="13" cy="6" rx="9" ry="11" transform="rotate(70 13 6)" fill="#9B85C4"/>
  <ellipse cx="0" cy="13" rx="10" ry="12" fill="#9B85C4"/>
  <!-- сердцевина: тёплый жёлтый глазок настоящей виолы -->
  <circle cx="0" cy="1" r="5.5" fill="#F3DDB9"/>
  <circle cx="0" cy="1" r="2.6" fill="#E0A83C"/>
</g>
</svg>